                    status: timerEntry.status || 'running',
                    itemNumber: timerEntry.itemNumber,

            };
        };

            }, []);

            const getProductionDate = (date) => {
                const prodDate = new Date(date);
                if (prodDate.getHours() < 3) {

        const TimerControls = ({ associateName, itemNumber, lotNumber, onStop }) => {
            const [startTime, setStartTime] = useState(null);
            const [elapsed, setElapsed] = useState(0);
            const [accumulated, setAccumulated] = useState(0);
            const [status, setStatus] = useState('stopped'); // stopped, running, paused

            const checkRegistry = useCallback(() => {
                if (!associateName) {
                    setStartTime(null);
                    setStatus('stopped');
                    return;
                }
                const allTimers = getActiveTimers();
                const entry = allTimers[associateName];
                const data = getTimerData(entry);

                if (data) {
                    setStartTime(data.startTime);
                    setAccumulated(data.accumulated);
                    setStatus(data.status);

                    const currentElapsed = data.accumulated + (data.status === 'running' ? (Date.now() - data.startTime) : 0);
                    setElapsed(currentElapsed);
                } else {
                    setStartTime(null);
                    setAccumulated(0);
                    setStatus('stopped');
                    setElapsed(0);
                }
            }, [associateName]);

            useEffect(() => {
                checkRegistry();
                window.addEventListener('jobTimerUpdate', checkRegistry);

                let interval = null;
                if (status === 'running') {
                    interval = setInterval(() => {
                        const now = Date.now();
                        setElapsed(accumulated + (now - startTime));
                    }, 1000);
                } else if (status === 'paused') {
                    // Keep displaying accumulated time
                    setElapsed(accumulated);
                }

                return () => {
                    window.removeEventListener('jobTimerUpdate', checkRegistry);
                    if (interval) clearInterval(interval);
                };
            }, [associateName, startTime, status, accumulated, checkRegistry]);

            const handleStart = () => {
                if (!associateName) return;
                const allTimers = getActiveTimers();

                // Save full job context
                const newEntry = {
                    startTime: Date.now(),
                    accumulated: 0,
                    status: 'running',
                    itemNumber: itemNumber || '',
                    lotNumber: lotNumber || ''
                };

                allTimers[associateName] = newEntry;
                setActiveTimers(allTimers);
            };

            const handlePause = () => {
                if (!associateName || status !== 'running') return;
                const allTimers = getActiveTimers();
                const entry = allTimers[associateName];
                const data = getTimerData(entry);

                const currentAccumulated = data.accumulated + (Date.now() - data.startTime);

                allTimers[associateName] = {
                    ...entry,
                    startTime: null,
                    accumulated: currentAccumulated,
                    status: 'paused'
                };
                setActiveTimers(allTimers);
            };

            const handleResume = () => {
                if (!associateName || status !== 'paused') return;
                const allTimers = getActiveTimers();
                const entry = allTimers[associateName];

                allTimers[associateName] = {
                    ...entry,
                    startTime: Date.now(),
                    status: 'running'
                };
                setActiveTimers(allTimers);
            };

            const handleStop = () => {
                if (!associateName) return;

                // Calculate final time
                const diff = elapsed; // elapsed state is already current
                const mins = Math.max(1, Math.round(diff / 60000)); // Minimum 1 minute

                const allTimers = getActiveTimers();
                delete allTimers[associateName];
                setActiveTimers(allTimers);

                onStop(mins.toString());
            };

            if (!associateName) return <div className="text-xs text-custom-muted italic p-2">Select Name to use Timer</div>;

            const hours = Math.floor(elapsed / 3600000);
            const minutes = Math.floor((elapsed % 3600000) / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);

                                onClick={handlePause}
                                className="flex items-center justify-center w-8 h-8 bg-yellow-100 text-yellow-700 rounded-lg hover:bg-yellow-200 transition shadow-sm border border-yellow-200"

                            </button>

                                onClick={handleResume}
                                className="flex items-center justify-center w-8 h-8 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 transition shadow-sm border border-green-200"
                                title="Resume Timer"

                            </button>
                        )}

                            className="flex items-center justify-center w-8 h-8 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition shadow-sm border border-red-200"

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={onClose}>
                    <div className="bg-custom-card border border-custom-card-border rounded-lg shadow-xl w-full max-w-sm p-6" onClick={e => e.stopPropagation()}>
                        <h3 className="text-lg font-bold text-custom-text mb-4">Quick Rate Lookup</h3>
                        <div className="space-y-3">
                            <div>
                                <label className="text-sm font-semibold text-custom-accent">Item Number</label>
                                <input type="text" value={item} onChange={e => setItem(e.target.value)} className="w-full p-2 border rounded" placeholder="e.g. 110121" />
                            </div>
                            <div>
                                <label className="text-sm font-semibold text-custom-accent">Sequence</label>
                                <select value={seq} onChange={e => setSeq(e.target.value)} className="w-full p-2 border rounded">
                                    <option value="">Select Sequence</option>
                                    {PRODUCTION_SEQUENCES.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                            <div className="mt-4 p-4 bg-gauge-bg rounded text-center">
                                <div className="text-sm text-custom-muted">Standard PPH</div>
                                <div className="text-3xl font-bold text-custom-text">{result !== null ? result.toLocaleString() : '—'}</div>
                            </div>
                        </div>
                        <div className="flex justify-end gap-2 mt-4">
                            <button onClick={onClose} className="px-4 py-2 bg-custom-accent text-white rounded font-bold">Close</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            // --- State ---
            const [entryType, setEntryType] = useState('job');

            // Common Fields
            const [associateName, setAssociateName] = useState('');
            const [eventDate, setEventDate] = useState('');
            const [timeWorked, setTimeWorked] = useState('');
            const [comments, setComments] = useState('');

            // Job Fields
            const [itemNumber, setItemNumber] = useState('');
            const [lotNumber, setLotNumber] = useState('');
            const [spoolFeet, setSpoolFeet] = useState('');
            const [partLength, setPartLength] = useState('');
            const [partUnit, setPartUnit] = useState('in');
            const [startQty, setStartQty] = useState('');
            const [endQty, setEndQty] = useState('');
            const [productionSequence, setProductionSequence] = useState('');
            const [recuts, setRecuts] = useState('');
            const [pullingWraps, setPullingWraps] = useState('');

            // Event Fields
            const [eventDropdown, setEventDropdown] = useState('');

            // Pareto Checkboxes
            const [inspectionPareto, setInspectionPareto] = useState({});
            const [pullingPareto, setPullingPareto] = useState({});
            const [pullingMethods, setPullingMethods] = useState({});

            // Calculated Results
            const [lengthInInches, setLengthInInches] = useState(0);
            const [totalInches, setTotalInches] = useState(0);
            const [partsFromSpool, setPartsFromSpool] = useState(0);
            const [isStartQtyAuto, setIsStartQtyAuto] = useState(false);
            const [scrapParts, setScrapParts] = useState(0);
            const [pph, setPph] = useState('—');
            const [yieldPercent, setYieldPercent] = useState(0);
            const [scrapPercent, setScrapPercent] = useState(0);
            const [baseStandardPph, setBaseStandardPph] = useState(0);
            const [adjustedStandard, setAdjustedStandard] = useState(0);
            const [sequenceOe, setSequenceOe] = useState(0);
            const [targetQty, setTargetQty] = useState(0);

            // UI State
            const [showInspectionPareto, setShowInspectionPareto] = useState(false);
            const [showPullingPareto, setShowPullingPareto] = useState(false);
            const [showPullingExtras, setShowPullingExtras] = useState(false);
            const [showRecuts, setShowRecuts] = useState(false);
            const [showSpoolFields, setShowSpoolFields] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isErrorModalOpen, setIsErrorModalOpen] = useState(false);
            const [errorMessages, setErrorMessages] = useState([]);
            const [isMultiplierModalOpen, setIsMultiplierModalOpen] = useState(false);
            const [isHistoryModalOpen, setIsHistoryModalOpen] = useState(false);
            const [jobHistory, setJobHistory] = useState([]);

            // New Smart Feature States
            const [isRateLookupOpen, setIsRateLookupOpen] = useState(false);
            const [showMyStats, setShowMyStats] = useState(false);
            const [qualityAlert, setQualityAlert] = useState(null);
            const [yieldAlert, setYieldAlert] = useState(null);

            // Timer Job Persistence State
            const [activeJobLocked, setActiveJobLocked] = useState(false);

            // Validation State
            const [itemNumberError, setItemNumberError] = useState('');
            const [lotNumberError, setLotNumberError] = useState('');
            const [sanityWarnings, setSanityWarnings] = useState([]);

            // --- Effects ---

            // Helper to enforce positive integers
            const enforceWholeNumber = (value) => value.replace(/\D/g, '');

            // Load History
            useEffect(() => {
                const storedHistory = localStorage.getItem('jobHistory');
                if (storedHistory) {
                    try {
                        const parsedHistory = JSON.parse(storedHistory);
                        const now = new Date();
                        const workdayStart = new Date(now);
                        if (now.getHours() < 3) {
                            workdayStart.setDate(workdayStart.getDate() - 1);
                        }
                        workdayStart.setHours(3, 0, 0, 0);

                        const currentWorkdayHistory = parsedHistory.filter(entry => {
                            const entryDate = new Date(entry.timestamp);
                            return entryDate >= workdayStart;
                        });

                        setJobHistory(currentWorkdayHistory);
                        localStorage.setItem('jobHistory', JSON.stringify(currentWorkdayHistory));
                    } catch (e) {
                        console.error("Failed to parse job history:", e);
                        localStorage.removeItem('jobHistory');
                    }
                }
            }, []);

            // Smart Feature: Associate Sequence Memory & Resume Job Timer
            useEffect(() => {
                if (!associateName) {
                    setActiveJobLocked(false);
                    return;
                }

                // 1. Sequence Memory
                const lastJob = jobHistory.find(j => j.associateName === associateName && j.entryType === 'job');
                if (lastJob && lastJob.data.productionSequence && !productionSequence) {
                    setProductionSequence(lastJob.data.productionSequence);
                }

                // 2. Resume Active Job Timer
                const allTimers = getActiveTimers();
                const entry = allTimers[associateName];
                const timerData = getTimerData(entry);

                if (timerData) {
                    // If there's stored job data, pre-fill it for the user
                    if (timerData.itemNumber) setItemNumber(timerData.itemNumber);
                    if (timerData.lotNumber) setLotNumber(timerData.lotNumber);
                    setActiveJobLocked(true);
                } else {
                    setActiveJobLocked(false);
                }
            }, [associateName, jobHistory]); // Run when name changes

            // Smart Feature: "Change of Mind" / Live Update for Active Timer
            useEffect(() => {
                if (!associateName) return;
                const allTimers = getActiveTimers();
                const entry = allTimers[associateName];

                // If this associate has an active timer, update its metadata live
                if (entry) {
                    let data = getTimerData(entry);
                    // Only update if changed
                    if (data.itemNumber !== itemNumber || data.lotNumber !== lotNumber) {
                        allTimers[associateName] = { ...entry, itemNumber, lotNumber };
                        setActiveTimers(allTimers);
                    }
                }
            }, [associateName, itemNumber, lotNumber]);

            // Smart Feature: Quality Alert
            useEffect(() => {
                if (!itemNumber) { setQualityAlert(null); return; }
                const issues = jobHistory.filter(j =>
                    j.data.itemNumber === itemNumber &&
                    (parseFloat(j.data.scrapPercent) > 5)
                );
                if (issues.length > 0) {
                    setQualityAlert("⚠️ Alert: High scrap (>5%) reported for this item earlier today. Check for defects.");
                } else {
                    setQualityAlert(null);
                }
            }, [itemNumber, jobHistory]);

            // Smart Feature: My Stats Calculation
            const myStats = useMemo(() => {
                if (!associateName) return null;
                const myEntries = jobHistory.filter(j => j.associateName === associateName && j.entryType === 'job');
                const totalParts = myEntries.reduce((acc, curr) => acc + (parseInt(curr.data.endQty) || 0), 0);

                const validOeEntries = myEntries.filter(j => j.data.sequenceOe !== undefined);
                const avgOe = validOeEntries.length > 0
                    ? validOeEntries.reduce((acc, curr) => acc + parseFloat(curr.data.sequenceOe), 0) / validOeEntries.length
                    : 0;

                return { totalParts, avgOe, count: myEntries.length };
            }, [associateName, jobHistory]);


            // Auto-Calc Start Qty
            useEffect(() => {
                const toInches = (v, u) => u === 'cm' ? v / 2.54 : u === 'mm' ? v / 25.4 : v;
                const feet = parseFloat(spoolFeet) || 0;
                const lenRaw = parseFloat(partLength) || 0;
                const lenIn = toInches(lenRaw, partUnit);
                setLengthInInches(lenIn);

                const totalIn = feet * 12;
                setTotalInches(totalIn);

                const calculatedParts = (totalIn > 0 && lenIn > 0) ? Math.floor(totalIn / lenIn) : 0;
                setPartsFromSpool(calculatedParts);

                const auto = totalIn > 0 && lenIn > 0;
                setIsStartQtyAuto(auto);

                if (auto) {
                    setStartQty(calculatedParts.toString());
                }
            }, [spoolFeet, partLength, partUnit]);

            // Results & Sanity Checks
            useEffect(() => {
                const currentStartQty = parseInt(startQty) || 0;
                const currentEndQty = parseInt(endQty) || 0;
                const timeMins = parseFloat(timeWorked) || 0;

                const standard = PPH_STANDARDS[itemNumber]?.[productionSequence] ?? 0;
                setBaseStandardPph(standard);

                const associateRate = ASSOCIATE_RATES[associateName] || 0;

                setScrapParts(Math.max(0, currentStartQty - currentEndQty));

                const timeHours = timeMins / 60;
                const actualPph = timeHours > 0 ? (currentEndQty / timeHours) : 0;
                setPph(actualPph > 0 ? actualPph.toFixed(1) : '—');

                const yieldNum = currentStartQty > 0 ? (currentEndQty / currentStartQty) * 100 : 0;
                // Ensure scrap percent doesn't go negative if end > start
                const scrapNum = currentStartQty > 0 ? Math.max(0, ((currentStartQty - currentEndQty) / currentStartQty) * 100) : 0;

                setYieldPercent(yieldNum);
                setScrapPercent(scrapNum);

                if (yieldNum > 100) {
                    setYieldAlert("Note: Yield exceeds 100%. Actual production is higher than calculated start quantity.");
                } else {
                    setYieldAlert(null);
                }

                const newStandard = (standard > 0 && associateRate > 0) ? standard / associateRate : 0;
                setAdjustedStandard(newStandard);

                const oe = (newStandard > 0) ? (actualPph / newStandard) * 100 : 0;
                setSequenceOe(oe);

                const target = newStandard > 0 ? (timeHours * newStandard) : 0;
                setTargetQty(Math.floor(target));

                const newSanity = [];
                // Removed blocking check for End > Start
                if (timeMins > 720) {
                    newSanity.push("Time Worked exceeds 12 hours. Please verify.");
                }
                if (timeMins > 0 && currentEndQty === 0 && currentStartQty > 0) {
                    newSanity.push("0 End Quantity entered. Did you produce nothing?");
                }
                setSanityWarnings(newSanity);

                const seq = productionSequence;
                setShowPullingExtras(seq === 'Pull');
                setShowSpoolFields(seq === 'Pull');
                setShowRecuts(seq === 'First Cut' || seq === 'Overall Length' || seq === 'Roll Cut (Both Ends)');

                const hasStart = startQty.trim() !== '';
                const hasEnd = endQty.trim() !== '';
                if (hasStart && hasEnd && yieldNum < 75) {
                    setShowInspectionPareto(seq === 'Inspection' || seq === 'EV3 Inspection');
                    setShowPullingPareto(seq === 'Pull');
                } else {
                    setShowInspectionPareto(false);
                    setShowPullingPareto(false);
                }
            }, [startQty, endQty, timeWorked, productionSequence, itemNumber, associateName]);

            // Item/Lot Validation
            useEffect(() => {
                if (itemNumber && !/^\d{6}$/.test(itemNumber)) {
                    setItemNumberError('Item number must be 6 digits.');
                } else {
                    setItemNumberError('');
                }
                if (lotNumber && /^\d{6}$/.test(lotNumber)) {
                    setLotNumberError('This looks like an Item Number. Please double-check.');
                } else {
                    setLotNumberError('');
                }
            }, [itemNumber, lotNumber]);

            const filteredHistory = useMemo(() => {
                if (!associateName) return [];
                return jobHistory
                    .filter(entry => entry.associateName === associateName)
                    .sort((a, b) => b.timestamp - a.timestamp);
            }, [jobHistory, associateName]);

            const fmt = (n) => (n === null || n === '—' || isNaN(Number(n))) ? '—' : Number(n).toLocaleString();

            const handleNumberInputScroll = (e) => {
                e.target.blur();
            };

            const handleEnterNavigation = (e) => {
                if (e.key === 'Enter' && e.target.tagName !== 'BUTTON' && e.target.type !== 'checkbox') {
                    if (e.target.tagName === 'TEXTAREA' && e.shiftKey) return;
                    e.preventDefault();
                    const focusableFields = Array.from(
                        document.querySelectorAll('input:not([type=checkbox]), select, textarea')
                    ).filter(el => !el.disabled && !el.readOnly && el.offsetHeight > 0 && el.offsetWidth > 0);

                    const currentIndex = focusableFields.indexOf(e.target);
                    if (currentIndex !== -1 && currentIndex < focusableFields.length - 1) {
                        const nextField = focusableFields[currentIndex + 1];
                        nextField.focus();
                        if (nextField.select && typeof nextField.select === 'function') {
                            nextField.select();
                        }
                    } else {
                        const submitButton = document.getElementById('submit-button-bottom') || document.getElementById('submit-button-top');
                        if (submitButton) submitButton.focus();
                    }
                }
            };

            const handleReset = useCallback(() => {
                setAssociateName('');
                setEventDate('');
                setEntryType('job');
                setTimeWorked('');
                setComments('');
                setItemNumber('');
                setLotNumber('');
                setSpoolFeet('');
                setPartLength('');
                setPartUnit('in');
                setStartQty('');
                setEndQty('');
                setProductionSequence('');
                setRecuts('');
                setPullingWraps('');
                setEventDropdown('');
                setInspectionPareto({});
                setPullingPareto({});
                setPullingMethods({});
                setIsSubmitting(false);
                setIsErrorModalOpen(false);
                setSanityWarnings([]);
                setQualityAlert(null);
                setYieldAlert(null);
                setShowMyStats(false);
                setActiveJobLocked(false);
            }, []);

            const handleSubmit = () => {
                setIsSubmitting(true);
                const errors = [];

                if (!associateName) errors.push('Associate Name');
                if (!eventDate) errors.push('Date');
                if (!timeWorked) errors.push('Time Worked');

                if (entryType === 'job') {
                    if (!itemNumber) errors.push('Item Number');
                    else if (itemNumberError) errors.push('Item Number (must be 6 digits)');

                    if (!lotNumber) errors.push('Lot Number');
                    if (!startQty) errors.push('Start Quantity');
                    if (!endQty) errors.push('End Quantity');
                    if (!productionSequence) errors.push('Production Sequence');

                    // Removed block for End > Start

                    if (showInspectionPareto && Object.values(inspectionPareto).every(v => !v)) {
                        errors.push('Inspection Pareto (at least one reason)');
                    }
                    if (showPullingPareto && Object.values(pullingPareto).every(v => !v)) {
                        errors.push('Pulling Pareto (at least one reason)');
                    }
                    if (showPullingExtras && !pullingWraps) {
                        errors.push('Pulling Wraps');
                    }
                    if (showPullingExtras && Object.values(pullingMethods).every(v => !v)) {
                        errors.push('Pulling Methods (at least one)');
                    }

                } else {
                    if (!eventDropdown) errors.push('Event');
                }

                if (errors.length > 0) {
                    setErrorMessages(errors);
                    setIsErrorModalOpen(true);
                    setIsSubmitting(false);
                    return;
                }

                // --- Save to History with Extra Data for Smart Stats ---
                const newEntry = {
                    id: Date.now(),
                    timestamp: Date.now(),
                    associateName,
                    entryType,
                    data: {
                        itemNumber, lotNumber, startQty, endQty, productionSequence, eventDropdown, timeWorked,
                        // Save calculated metrics for history stats
                        sequenceOe: sequenceOe,
                        scrapPercent: scrapPercent
                    }
                };
                const updatedHistory = [newEntry, ...jobHistory];
                setJobHistory(updatedHistory);
                localStorage.setItem('jobHistory', JSON.stringify(updatedHistory));

                const params = new URLSearchParams();

                params.append("Entry Type", entryType === 'job' ? 'Job' : 'Event');
                params.append("Associate Name", associateName);
                params.append("Date", eventDate);
                params.append("Time Worked", timeWorked);
                if (comments) params.append("Comments", comments);

                if (entryType === 'job') {
                    params.append("Item", itemNumber);
                    params.append("Lot #", lotNumber);
                    params.append("Start Quantity", startQty);
                    params.append("End Quantity", endQty);
                    params.append("Sequence", productionSequence);

                    if (spoolFeet) params.append("Footage", spoolFeet);
                    if (partLength) params.append("Processing Length", partLength);

                    const scrapPartsStr = fmt(scrapParts);
                    if (scrapPartsStr !== '—') params.append("Scrap Parts", scrapPartsStr);

                    const scrapRateForSubmission = parseInt(startQty) > 0 ? `${scrapPercent.toFixed(1)}%` : '—';
                    if (scrapRateForSubmission !== '—') params.append("Scrap Rate %", scrapRateForSubmission);

                    const sequenceOeForSubmission = `${sequenceOe.toFixed(1)}%`;
                    if (sequenceOe > 0) params.append("Sequence OE", sequenceOeForSubmission);

                    const getCheckedLabels = (paretoItems, state) => {
                        return paretoItems
                            .filter(item => state[item.id])
                            .map(item => item.label);
                    };

                    if (showInspectionPareto) {
                        getCheckedLabels(INSPECTION_PARETO, inspectionPareto).forEach(label => params.append("Inspection Pareto", label));
                    }
                    if (showPullingPareto) {
                        getCheckedLabels(PULLING_PARETO, pullingPareto).forEach(label => params.append("Pulling Pareto", label));
                    }
                    if (showPullingExtras) {
                        if (pullingWraps) params.append("Pulling Wraps", pullingWraps);
                        getCheckedLabels(PULLING_METHODS, pullingMethods).forEach(label => params.append("Pulling Method", label));
                    }
                    if (showRecuts && recuts) {
                        params.append("Re-Cuts", recuts);
                    }
                } else {
                    params.append("Event", eventDropdown);
                }

                const smartsheetUrl = `https://app.smartsheet.com/b/form/248bcb0aeced4c1bb8782da7d00fc64b?${params.toString()}`;

                window.open(smartsheetUrl, 'smartsheetForm');
                handleReset();
            };

            const handleCheckboxChange = (setter, id) => {
                setter(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const getGaugeColor = (value, type) => {
                if (type === 'yield') {
                    if (value >= 95) return 'bg-gauge-green';
                    if (value >= 85) return 'bg-gauge-yellow';
                    return 'bg-gauge-red';
                }
                if (value <= 5) return 'bg-gauge-green';
                if (value <= 15) return 'bg-gauge-yellow';
                return 'bg-gauge-red';
            };

            const EntryToggle = () => (
                <div className="grid grid-cols-2 gap-1.5 bg-gauge-bg p-1 rounded-lg border border-custom-card-border">
                    <button onClick={() => setEntryType('job')} className={`px-3 py-2 text-sm font-semibold rounded-md transition-colors ${entryType === 'job' ? 'bg-custom-accent text-white shadow' : 'text-custom-muted hover:bg-custom-accent/10'}`}>Job Entry</button>
                    <button onClick={() => setEntryType('event')} className={`px-3 py-2 text-sm font-semibold rounded-md transition-colors ${entryType === 'event' ? 'bg-custom-accent text-white shadow' : 'text-custom-muted hover:bg-custom-accent/10'}`}>Event Entry</button>
                </div>
            );

            const CheckboxGrid = ({ items, state, setState, title }) => (
                <div className="space-y-2">
                    <label className="text-sm font-semibold text-custom-accent">{title}</label>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                        {items.map(({ id, label }) => (
                            <div key={id} className="flex items-center bg-input-bg border border-input-border rounded-lg p-2.5 hover:border-custom-accent hover:bg-custom-accent/5 transition-colors">
                                <input type="checkbox" id={id} checked={!!state[id]} onChange={() => handleCheckboxChange(setState, id)} className="h-4 w-4 rounded border-gray-300 text-custom-accent focus:ring-custom-accent" />
                                <label htmlFor={id} className="ml-3 block text-sm text-custom-text">{label}</label>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const Modal = ({ isOpen, onClose, title, children }) => {
                if (!isOpen) return null;
                return (
                    <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={onClose}>
                        <div className="bg-custom-card border border-custom-card-border rounded-lg shadow-xl w-full max-w-md p-6" onClick={e => e.stopPropagation()}>
                            <h3 className="text-xl font-bold text-custom-text mb-2">{title}</h3>
                            <div className="text-custom-muted mb-4">{children}</div>
                            <div className="flex justify-end gap-3">
                                <button onClick={onClose} className="bg-transparent border border-custom-muted text-custom-muted font-bold py-2 px-4 rounded-lg hover:bg-custom-muted hover:text-white transition-colors">Close</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const MultiplierModal = ({ isOpen, onClose, onApply, baseQty }) => {
                const [currentMultiplier, setCurrentMultiplier] = useState('1');
                const calculatedQty = baseQty * (parseFloat(currentMultiplier) || 0);
                if (!isOpen) return null;
                return (
                    <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={onClose}>
                        <div className="bg-custom-card border border-custom-card-border rounded-lg shadow-xl w-full max-w-md p-6" onClick={e => e.stopPropagation()}>
                            <h3 className="text-xl font-bold text-custom-text mb-4">Apply Multiplier</h3>
                            <div className="space-y-4 mb-6 text-center">
                                <div className="flex items-center justify-center gap-4 text-lg">
                                    <div className="p-3 bg-gauge-bg rounded-lg">
                                        <div className="text-sm text-custom-muted">Base Qty</div>
                                        <div className="font-bold text-2xl">{fmt(baseQty)}</div>
                                    </div>
                                    <div className="text-2xl text-custom-muted">&times;</div>
                                    <div className="w-24">
                                        <label htmlFor="multiplierInput" className="text-sm text-custom-accent">Multiplier</label>
                                        <input id="multiplierInput" type="number" value={currentMultiplier} onChange={e => setCurrentMultiplier(e.target.value)} onWheel={handleNumberInputScroll} className="w-full text-center bg-input-bg text-custom-text rounded-lg border border-input-border p-3 text-2xl font-bold focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition" />
                                    </div>
                                    <div className="text-2xl text-custom-muted">=</div>
                                    <div className="p-3 bg-custom-accent/10 rounded-lg">
                                        <div className="text-sm text-custom-accent">New Qty</div>
                                        <div className="font-bold text-2xl text-custom-accent">{fmt(Math.floor(calculatedQty))}</div>
                                    </div>
                                </div>
                            </div>
                            <div className="flex justify-end gap-3">
                                <button onClick={onClose} className="bg-transparent border border-custom-muted text-custom-muted font-bold py-2 px-4 rounded-lg hover:bg-custom-muted hover:text-white transition-colors">Cancel</button>
                                <button onClick={() => onApply(parseFloat(currentMultiplier) || 1)} className="bg-custom-accent text-white font-bold py-2 px-4 rounded-lg shadow-md hover:opacity-90 transition-all">Apply</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const HistoryModal = ({ isOpen, onClose, history, associate }) => {
                if (!isOpen) return null;
                return (
                    <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={onClose}>
                        <div className="bg-custom-card border border-custom-card-border rounded-lg shadow-xl w-full max-w-lg p-6 flex flex-col" onClick={e => e.stopPropagation()}>
                            <h3 className="text-xl font-bold text-custom-text mb-2">Today's History for {associate}</h3>
                            <div className="flex-grow overflow-y-auto max-h-[60vh] my-4 pr-2 space-y-3">
                                {history.length > 0 ? (
                                    history.map(entry => (
                                        <div key={entry.id} className="p-3 bg-gauge-bg rounded-lg border border-custom-card-border">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className={`text-sm font-bold px-2 py-0.5 rounded-full ${entry.entryType === 'job' ? 'bg-custom-accent/20 text-custom-accent' : 'bg-custom-accent2/20 text-custom-accent2'}`}>
                                                    {entry.entryType === 'job' ? 'Job' : 'Event'}
                                                </span>
                                                <span className="text-sm text-custom-muted">{new Date(entry.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                            </div>
                                            {entry.entryType === 'job' ? (
                                                <div className="grid grid-cols-[auto_1fr] gap-x-3 gap-y-1 text-sm">
                                                    <span className="font-semibold text-custom-muted">Item:</span><span className="text-custom-text font-mono">{entry.data.itemNumber}</span>
                                                    <span className="font-semibold text-custom-muted">Lot:</span><span className="text-custom-text font-mono">{entry.data.lotNumber}</span>
                                                    <span className="font-semibold text-custom-muted">Seq:</span><span className="text-custom-text">{entry.data.productionSequence}</span>
                                                    <span className="font-semibold text-custom-muted">Time:</span><span className="text-custom-text">{entry.data.timeWorked} min</span>
                                                </div>
                                            ) : (
                                                <div className="grid grid-cols-[auto_1fr] gap-x-3 gap-y-1 text-sm">
                                                    <span className="font-semibold text-custom-muted">Event:</span><span className="text-custom-text">{entry.data.eventDropdown}</span>
                                                    <span className="font-semibold text-custom-muted">Time:</span><span className="text-custom-text">{entry.data.timeWorked} min</span>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                ) : (<p className="text-custom-muted text-center py-8">No entries for {associate} today.</p>)}
                            </div>
                            <div className="flex justify-end items-center pt-4 border-t border-custom-card-border">
                                <button onClick={onClose} className="bg-custom-accent text-white font-bold py-2 px-4 rounded-lg shadow-md hover:opacity-90 transition-all">Close</button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-6xl mx-auto font-sans">
                    <Modal isOpen={isErrorModalOpen} onClose={() => setIsErrorModalOpen(false)} title="Missing Required Fields">
                        <p>Please complete the following fields before submitting:</p>
                        <ul className="list-disc list-inside mt-2 space-y-1">
                            {errorMessages.map((msg, i) => <li key={i}>{msg}</li>)}
                        </ul>
                    </Modal>

                    <MultiplierModal isOpen={isMultiplierModalOpen} onClose={() => setIsMultiplierModalOpen(false)} baseQty={partsFromSpool} onApply={(m) => { setStartQty(Math.floor(partsFromSpool * m).toString()); setIsStartQtyAuto(false); setIsMultiplierModalOpen(false); }} />
                    <HistoryModal isOpen={isHistoryModalOpen} onClose={() => setIsHistoryModalOpen(false)} history={filteredHistory} associate={associateName || '...'} />
                    <RateLookupModal isOpen={isRateLookupOpen} onClose={() => setIsRateLookupOpen(false)} />

                    <header className="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6 pb-4 border-b border-custom-card-border">
                        <div className="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-start">
                            <div className="flex items-center gap-4">
                                <div className="text-3xl font-black text-custom-accent tracking-wider">INTEGER</div>
                                <div className="border-l border-custom-card-border h-8"></div>
                                <h1 className="text-xl sm:text-2xl font-bold text-custom-text leading-tight">PTFE Production Portal</h1>
                            </div>
                        </div>
                        <div className="hidden md:flex flex-col items-center gap-2">
                            <LiveClock />
                            <ActiveTimersWidget />
                        </div>
                        <div className="flex gap-2 w-full sm:w-auto flex-wrap justify-center sm:justify-end">
                            <button onClick={() => setIsRateLookupOpen(true)} className="bg-custom-accent2/10 text-custom-accent2 font-bold py-2 px-3 rounded-lg hover:bg-custom-accent2/20 transition-colors flex items-center gap-1 border border-custom-accent2/20">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg> Check Rate
                            </button>
                            <button id="submit-button-top" onClick={handleSubmit} disabled={isSubmitting} className="bg-custom-accent text-white font-bold py-2 px-4 rounded-lg shadow-md hover:opacity-90 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none">
                                {isSubmitting ? 'Submitting...' : 'Submit'}
                            </button>
                            <button onClick={handleReset} className="bg-transparent border border-custom-muted text-custom-muted font-bold py-2 px-3 rounded-lg hover:bg-custom-muted hover:text-white transition-colors flex items-center gap-1" title="Reset Form">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                Reset
                            </button>
                            <button onClick={() => setIsHistoryModalOpen(true)} className="relative bg-transparent border border-custom-muted text-custom-muted font-bold py-2 px-4 rounded-lg hover:bg-custom-muted hover:text-white transition-colors">
                                History
                                {filteredHistory.length > 0 && <span className="absolute -top-2 -right-2 flex h-6 w-6 items-center justify-center rounded-full bg-custom-accent2 text-white text-xs font-bold">{filteredHistory.length}</span>}
                            </button>
                        </div>
                    </header>

                    <main className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                        {/* --- INPUTS CARD --- */}
                        <section className="bg-custom-card border border-custom-card-border rounded-lg p-5 shadow-lg space-y-4">
                            <div className="flex justify-between items-center"><h2 className="text-base font-semibold text-custom-muted">Inputs</h2></div>
                            {sanityWarnings.length > 0 && (
                                <div className="bg-red-50 border-l-4 border-red-500 p-3 rounded">
                                    <div className="text-red-800 font-bold text-sm mb-1">Please Check:</div>
                                    <ul className="list-disc list-inside text-xs text-red-700 space-y-0.5">{sanityWarnings.map((warn, i) => <li key={i}>{warn}</li>)}</ul>
                                </div>
                            )}
                            {yieldAlert && (
                                <div className="bg-yellow-50 border-l-4 border-yellow-500 p-3 rounded">
                                    <div className="text-yellow-800 font-bold text-sm">Notice</div>
                                    <div className="text-xs text-yellow-700">{yieldAlert}</div>
                                </div>
                            )}
                            <div className="space-y-1"><label className="text-sm font-semibold text-custom-accent">Entry Type</label><EntryToggle /></div>

                            {/* Associate Name + My Stats Toggle */}
                            <div className="space-y-1">
                                <div className="flex justify-between items-baseline">
                                    <label htmlFor="associateName" className="text-sm font-semibold text-custom-accent">Associate Name</label>
                                    {associateName && (
                                        <button onClick={() => setShowMyStats(!showMyStats)} className="text-xs text-custom-accent2 font-bold hover:underline focus:outline-none">
                                            {showMyStats ? 'Hide My Stats' : 'Show My Stats'}
                                        </button>
                                    )}
                                </div>
                                <select id="associateName" value={associateName} onChange={e => setAssociateName(e.target.value)} onKeyDown={handleEnterNavigation} className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition">
                                    <option value="" disabled>Select an associate...</option>
                                    {ASSOCIATES.map(name => <option key={name} value={name}>{name}</option>)}
                                </select>

                                {/* My Stats Panel */}
                                {showMyStats && myStats && (
                                    <div className="mt-2 bg-blue-50 border border-blue-100 rounded-lg p-3 grid grid-cols-3 gap-2 text-center animate-pulse-slow">
                                        <div><div className="text-xs text-blue-600 font-semibold uppercase">Jobs</div><div className="font-bold text-blue-900">{myStats.count}</div></div>
                                        <div><div className="text-xs text-blue-600 font-semibold uppercase">Total Parts</div><div className="font-bold text-blue-900">{fmt(myStats.totalParts)}</div></div>
                                        <div><div className="text-xs text-blue-600 font-semibold uppercase">Avg Efficiency</div><div className="font-bold text-blue-900">{myStats.avgOe.toFixed(0)}%</div></div>
                                    </div>
                                )}
                            </div>

                            <div className="space-y-1"><label htmlFor="eventDate" className="text-sm font-semibold text-custom-accent">Date</label><input id="eventDate" type="date" value={eventDate} onChange={e => setEventDate(e.target.value)} onKeyDown={handleEnterNavigation} className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition" /></div>

                            {entryType === 'job' && (
                                <div id="jobSpecificFields" className="space-y-4">
                                    <div className="space-y-1">
                                        <label htmlFor="itemNumber" className="text-sm font-semibold text-custom-accent flex items-center gap-1">
                                            Item Number
                                            {activeJobLocked && <span title="Locked to Active Timer" className="text-green-600">🔒</span>}
                                        </label>
                                        <input
                                            id="itemNumber"
                                            type="text"
                                            inputMode="numeric"
                                            pattern="[0-9]*"
                                            placeholder="e.g. 311318"
                                            value={itemNumber}
                                            onChange={e => setItemNumber(enforceWholeNumber(e.target.value))}
                                            onKeyDown={handleEnterNavigation}
                                            className={`w-full bg-input-bg text-custom-text rounded-lg border p-3 focus:ring-2 focus:border-custom-accent transition ${itemNumberError ? 'border-red-500 ring-red-500' : activeJobLocked ? 'border-green-400 ring-1 ring-green-400 bg-green-50' : 'border-input-border focus:ring-custom-accent'}`}
                                        />
                                        {itemNumberError && <p className="text-xs text-red-600 mt-1">{itemNumberError}</p>}
                                        {qualityAlert && (
                                            <div className="mt-1 bg-yellow-50 text-yellow-800 text-xs p-2 rounded border border-yellow-200 font-semibold">
                                                {qualityAlert}
                                            </div>
                                        )}
                                    </div>
                                    <div className="space-y-1">
                                        <label htmlFor="lotNumber" className="text-sm font-semibold text-custom-accent flex items-center gap-1">
                                            Lot Number
                                            {activeJobLocked && <span title="Locked to Active Timer" className="text-green-600">🔒</span>}
                                        </label>
                                        <input id="lotNumber" type="text" placeholder="e.g. 10155074-04" value={lotNumber} onChange={e => setLotNumber(e.target.value)} onKeyDown={handleEnterNavigation} className={`w-full bg-input-bg text-custom-text rounded-lg border p-3 focus:ring-2 focus:border-custom-accent transition ${lotNumberError ? 'border-yellow-500 ring-yellow-500' : activeJobLocked ? 'border-green-400 ring-1 ring-green-400 bg-green-50' : 'border-input-border focus:ring-custom-accent'}`} />
                                        {lotNumberError && <p className="text-xs text-yellow-700 mt-1">{lotNumberError}</p>}
                                    </div>
                                    <div className="space-y-1">
                                        <label htmlFor="productionSequence" className="text-sm font-semibold text-custom-accent">Production Sequence</label>
                                        <select id="productionSequence" value={productionSequence} onChange={e => setProductionSequence(e.target.value)} onKeyDown={handleEnterNavigation} className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition">
                                            <option value="" disabled>Select a sequence...</option>
                                            {PRODUCTION_SEQUENCES.map(seq => <option key={seq} value={seq}>{seq}</option>)}
                                        </select>
                                    </div>
                                    {showSpoolFields && (
                                        <>
                                            <div className="space-y-1"><label htmlFor="spoolFeet" className="text-sm font-semibold text-custom-accent">Full Spool Footage (feet)</label><input id="spoolFeet" type="number" min="0" step="0.01" placeholder="e.g. 2500" value={spoolFeet} onChange={e => setSpoolFeet(e.target.value)} onKeyDown={handleEnterNavigation} onWheel={handleNumberInputScroll} className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition text-right" /></div>
                                            <div className="space-y-1">
                                                <label htmlFor="partLength" className="text-sm font-semibold text-custom-accent">Processing / Part Length</label>
                                                <div className="grid grid-cols-[1fr_auto_auto] gap-3 items-center">
                                                    <input id="partLength" type="number" min="0" step="0.001" placeholder="e.g. 48" value={partLength} onChange={e => setPartLength(e.target.value)} onKeyDown={handleEnterNavigation} onWheel={handleNumberInputScroll} className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition text-right" />
                                                    <select id="partUnit" value={partUnit} onChange={e => setPartUnit(e.target.value)} onKeyDown={handleEnterNavigation} className="bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition"><option value="in">in</option><option value="cm">cm</option><option value="mm">mm</option></select>
                                                    <div className="bg-gauge-bg border border-custom-card-border rounded-lg px-3 py-2 text-right min-w-[100px]"><div className="text-sm font-semibold text-custom-muted">Inches</div><div className="font-bold text-lg text-custom-text">{fmt(lengthInInches)}</div></div>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                    <div className="space-y-1">
                                        <label htmlFor="startQty" className="text-sm font-semibold text-custom-accent">Start Quantity</label>
                                        <div className="flex items-center gap-2">
                                            <input
                                                id="startQty"
                                                type="text"
                                                inputMode="numeric"
                                                pattern="[0-9]*"
                                                placeholder="—"
                                                readOnly={isStartQtyAuto}
                                                value={startQty}
                                                onChange={e => { setStartQty(enforceWholeNumber(e.target.value)); setIsStartQtyAuto(false); }}
                                                onKeyDown={handleEnterNavigation}
                                                className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition text-right read-only:bg-gauge-bg read-only:cursor-not-allowed"
                                            />
                                            {isStartQtyAuto && <button onClick={() => setIsMultiplierModalOpen(true)} className="bg-custom-accent2/10 text-custom-accent2 font-bold py-2.5 px-4 rounded-lg hover:bg-custom-accent2/20 transition-colors whitespace-nowrap" title="Apply Multiplier">&times; Apply Multiplier</button>}
                                        </div>
                                        <div className="text-xs text-custom-muted/70 pl-1">{isStartQtyAuto ? 'Auto-calculated. Apply multiplier if needed.' : 'Enter manually.'}</div>
                                    </div>
                                    <div className="space-y-1">
                                        <label htmlFor="endQty" className="text-sm font-semibold text-custom-accent">End Quantity</label>
                                        <input
                                            id="endQty"
                                            type="text"
                                            inputMode="numeric"
                                            pattern="[0-9]*"
                                            placeholder="—"
                                            value={endQty}
                                            onChange={e => setEndQty(enforceWholeNumber(e.target.value))}
                                            onKeyDown={handleEnterNavigation}
                                            className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition text-right"
                                        />
                                    </div>
                                    {showRecuts && <div className="space-y-1"><label htmlFor="recuts" className="text-sm font-semibold text-custom-accent">Recuts</label><input id="recuts" type="number" min="0" step="1" placeholder="Enter number of recuts" value={recuts} onChange={e => setRecuts(e.target.value)} onKeyDown={handleEnterNavigation} onWheel={handleNumberInputScroll} className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition" /></div>}
                                </div>
                            )}

                            {entryType === 'event' && (
                                <div id="eventSpecificFields" className="space-y-4">
                                    <div className="space-y-1">
                                        <label htmlFor="eventDropdown" className="text-sm font-semibold text-custom-accent">Event</label>
                                        <select id="eventDropdown" value={eventDropdown} onChange={e => setEventDropdown(e.target.value)} onKeyDown={handleEnterNavigation} className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition">
                                            <option value="" disabled>Select an event...</option>
                                            {EVENTS.map(evt => <option key={evt} value={evt}>{evt}</option>)}
                                        </select>
                                    </div>
                                </div>
                            )}

                            <div className="space-y-1">
                                <label htmlFor="timeWorked" className="text-sm font-semibold text-custom-accent">Time Worked (Minutes)</label>
                                <div className="flex gap-2">
                                    <input
                                        id="timeWorked"
                                        type="text"
                                        inputMode="numeric"
                                        pattern="[0-9]*"
                                        placeholder="e.g. 90"
                                        value={timeWorked}
                                        onChange={e => setTimeWorked(enforceWholeNumber(e.target.value))}
                                        onKeyDown={handleEnterNavigation}
                                        className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition"
                                    />
                                    <TimerControls associateName={associateName} itemNumber={itemNumber} lotNumber={lotNumber} onStop={(val) => setTimeWorked(val)} />
                                </div>
                            </div>
                            <div className="space-y-1"><label htmlFor="comments" className="text-sm font-semibold text-custom-accent">Comments</label><textarea id="comments" placeholder="Enter comments..." value={comments} onChange={e => setComments(e.target.value)} onKeyDown={handleEnterNavigation} className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition min-h-[80px] resize-vertical" /></div>
                        </section>

                        {/* --- RESULTS CARD --- */}
                        <section className={`bg-custom-card border border-custom-card-border rounded-lg p-5 shadow-lg space-y-4 ${entryType === 'event' && 'hidden'}`}>
                            <h2 className="text-base font-semibold text-custom-muted mb-2">Results</h2>
                            <div className="flex gap-4 bg-gauge-bg border border-dashed border-input-border rounded-lg p-3">
                                <div className="flex-1"><div className="text-sm font-semibold text-custom-muted">Total Spool (in)</div><strong className="text-xl font-bold">{fmt(totalInches)}</strong></div>
                                <div className="flex-1"><div className="text-sm font-semibold text-custom-muted">Parts from Spool</div><strong className="text-xl font-bold">{fmt(partsFromSpool)}</strong></div>
                            </div>
                            <div className="flex gap-4 bg-gauge-bg border border-dashed border-input-border rounded-lg p-3">
                                <div className="flex-1"><div className="text-sm font-semibold text-custom-muted">Scrap Parts</div><strong className="text-xl font-bold">{fmt(scrapParts)}</strong></div>
                                <div className="flex-1"><div className="text-sm font-semibold text-custom-muted">Parts Per Hour</div><strong className="text-xl font-bold">{pph}</strong></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-gauge-bg border border-custom-card-border rounded-lg p-3">
                                    <div className="text-sm font-semibold text-custom-muted mb-2">Yield %</div>
                                    <div className="text-xl font-bold text-right mb-1">{startQty ? `${yieldPercent.toFixed(1)}%` : '—'}</div>
                                    <div className="w-full h-2 bg-white rounded-full overflow-hidden border border-custom-card-border"><div className={`h-full rounded-full transition-all duration-500 ${getGaugeColor(yieldPercent, 'yield')}`} style={{ width: `${Math.min(yieldPercent, 100)}%` }} /></div>
                                </div>
                                <div className="bg-gauge-bg border border-custom-card-border rounded-lg p-3">
                                    <div className="text-sm font-semibold text-custom-muted mb-2">Scrap Rate %</div>
                                    <div className="text-xl font-bold text-right mb-1">{startQty ? `${scrapPercent.toFixed(1)}%` : '—'}</div>
                                    <div className="w-full h-2 bg-white rounded-full overflow-hidden border border-custom-card-border"><div className={`h-full rounded-full transition-all duration-500 ${getGaugeColor(scrapPercent, 'scrap')}`} style={{ width: `${scrapPercent}%` }} /></div>
                                </div>
                            </div>
                            <div className="flex gap-4 bg-gauge-bg border border-dashed border-input-border rounded-lg p-3">
                                <div className="flex-1"><div className="text-sm font-semibold text-custom-muted">Base Standard (PPH)</div><strong className="text-xl font-bold">{fmt(baseStandardPph)}</strong></div>
                                <div className="flex-1"><div className="text-sm font-semibold text-custom-muted">Adjusted Standard (PPH)</div><strong className="text-xl font-bold">{baseStandardPph ? fmt(adjustedStandard.toFixed(1)) : '—'}</strong></div>
                            </div>
                            {timeWorked && baseStandardPph ? (
                                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 grid grid-cols-2 gap-4">
                                    <div><div className="text-xs font-bold text-blue-800 uppercase tracking-wide">Target Qty</div><div className="text-2xl font-black text-blue-900">{fmt(targetQty)}</div><div className="text-[10px] text-blue-600">Based on Time & Rate</div></div>
                                    <div><div className="text-xs font-bold text-blue-800 uppercase tracking-wide">Efficiency</div><div className={`text-2xl font-black ${sequenceOe >= 100 ? 'text-green-600' : sequenceOe >= 85 ? 'text-yellow-600' : 'text-red-600'}`}>{baseStandardPph ? `${sequenceOe.toFixed(0)}%` : '—'}</div><div className="text-[10px] text-blue-600">Actual vs Target</div></div>
                                </div>
                            ) : null}
                            <div className="grid grid-cols-1 gap-4">
                                <div className="bg-gauge-bg border border-custom-card-border rounded-lg p-3">
                                    <div className="text-sm font-semibold text-custom-muted mb-2">Sequence OE %</div>
                                    <div className="text-xl font-bold text-right mb-1">{baseStandardPph ? `${sequenceOe.toFixed(1)}%` : '—'}</div>
                                    <div className="w-full h-2 bg-white rounded-full overflow-hidden border border-custom-card-border"><div className={`h-full rounded-full transition-all duration-500 ${getGaugeColor(sequenceOe, 'yield')}`} style={{ width: `${Math.min(sequenceOe, 100)}%` }} /></div>
                                </div>
                            </div>
                            <div className="border-t border-custom-card-border pt-4 space-y-4">
                                {showInspectionPareto && <CheckboxGrid items={INSPECTION_PARETO} state={inspectionPareto} setState={setInspectionPareto} title="Inspection Pareto" />}
                                {showPullingPareto && <CheckboxGrid items={PULLING_PARETO} state={pullingPareto} setState={setPullingPareto} title="Pulling Pareto" />}
                                {showPullingExtras && (
                                    <div className="space-y-4">
                                        <div className="space-y-1"><label htmlFor="pullingWraps" className="text-sm font-semibold text-custom-accent">Pulling Wraps</label><input id="pullingWraps" type="number" min="0" step="1" placeholder="Enter number of wraps" value={pullingWraps} onChange={e => setPullingWraps(e.target.value)} onKeyDown={handleEnterNavigation} onWheel={handleNumberInputScroll} className="w-full bg-input-bg text-custom-text rounded-lg border border-input-border p-3 focus:ring-2 focus:ring-custom-accent focus:border-custom-accent transition" /></div>
                                        <CheckboxGrid items={PULLING_METHODS} state={pullingMethods} setState={setPullingMethods} title="Pulling Methods" />
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>

                    <div className="flex justify-end gap-3 mt-6">
                        <button id="submit-button-bottom" onClick={handleSubmit} disabled={isSubmitting} className="bg-custom-accent text-white font-bold py-2.5 px-5 rounded-lg shadow-md hover:opacity-90 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none">{isSubmitting ? 'Submitting...' : 'Submit to Smartsheet'}</button>
                        <button onClick={handleReset} className="bg-transparent border border-custom-muted text-custom-muted font-bold py-2.5 px-5 rounded-lg hover:bg-custom-muted hover:text-white transition-colors">Reset</button>
                    </div>
                    <footer className="mt-4 text-center text-xs text-custom-muted"><p>Logic: If Spool Footage and Part Length are provided, Start Qty is auto-calculated. Otherwise, enter Start/End manually. All numbers update live.</p></footer>
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);

    </script>
</body>

</html>
