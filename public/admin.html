<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting | Admin</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
        }
        h1 {
            color: #38bdf8;
            margin-top: 0;
        }
        p {
            color: #94a3b8;
        }
        a {
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Opening Admin...</h1>
        <p id="message">Checking your department.</p>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
        const adminToken = localStorage.getItem('adminToken');
        const message = document.getElementById('message');

        if (!user || user.role !== 'Supervisor' || !adminToken) {
            window.location.replace('/login.html');
        } else if ((user.departmentKey || 'PL') === 'PTFE') {
            window.location.replace('/admin-ptfe.html');
        } else if ((user.departmentKey || 'PL') === 'PI') {
            window.location.replace('/admin-pi.html');
        } else if ((user.departmentKey || 'PL') === 'PL') {
            window.location.replace('/admin-pl.html');
        } else {
            message.innerHTML = 'No admin panel exists for this department yet. <a href="/">Return to portal</a>.';
        }
    </script>
</body>
</html>
